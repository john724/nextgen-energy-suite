name: NextGen Energy Suite CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Train ML Models (Verification)
      run: |
        python ml_engine.py
        
    - name: Run Core Modules
      run: |
        python b2b_energy_optimizer.py
        python microgrid_p2p_trader.py
        python ev_fleet_smart_charger.py
        
    - name: Test FastAPI Server Boot
      run: |
        # Boot the server in the background and verify it listens on port 8000
        uvicorn api:app --host 0.0.0.0 --port 8000 &
        sleep 5
        curl -s http://localhost:8000/api/config | grep -q ml_mode_active
